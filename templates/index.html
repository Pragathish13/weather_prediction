<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container text-center mt-5">
    <h1 class="mb-4">🌦️ Weather Forecast</h1>

   <form method="POST" class="mb-4">
    <input type="text" name="city" placeholder="Enter City" class="form-control mb-2" required>
    
    <button class="btn btn-primary">Get Weather</button>
    
    <!-- ✅ Add this button -->
    <button type="button" onclick="getLocation()" class="btn btn-warning mt-2">
        Use My Location
    </button>
</form>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    {% if weather %}
        <div class="row">
            {% for day in weather %}
                <div class="col-md-2">
                    <div class="card bg-secondary text-white mb-3">
                        <div class="card-body">
                            <h6>{{ day.date }}</h6>
                            <img src="http://openweathermap.org/img/wn/{{ day.icon }}@2x.png">
                            <p>{{ day.temp }}°C</p>
                            <p>{{ day.desc }}</p>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% endif %}
</div>
<script>
function getLocation() {
    navigator.geolocation.getCurrentPosition(position => {
        fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${position.coords.latitude}&lon=${position.coords.longitude}&appid=271372df647acf07335e8ab7c7e6dc69&units=metric`)
        .then(res => res.json())
        .then(data => {
            document.querySelector('input[name="city"]').value = data.name;
        });
    });
}
</script>
</body>
</html>
